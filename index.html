<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoFit Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#08080a;color:#f0f0f0;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111114}::-webkit-scrollbar-thumb{background:#e63946;border-radius:3px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(230,57,70,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(244,162,97,.06) 0%,transparent 50%),#08080a}
.login-float{position:absolute;border-radius:50%;opacity:.04;animation:float 20s infinite ease-in-out}
.login-float:nth-child(1){width:300px;height:300px;background:#e63946;top:-50px;left:-80px}
.login-float:nth-child(2){width:200px;height:200px;background:#f4a261;bottom:-40px;right:-60px;animation-delay:-7s}
.login-float:nth-child(3){width:150px;height:150px;background:#2ecc71;top:40%;right:10%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
.login-card{background:rgba(24,24,28,.9);backdrop-filter:blur(20px);border:1px solid #2a2a2e;border-radius:24px;width:100%;max-width:420px;padding:40px 32px;position:relative;z-index:1}
.login-input{width:100%;background:#111114;border:1px solid #2a2a2e;border-radius:12px;padding:12px 16px;padding-left:44px;color:#f0f0f0;font-size:14px;font-family:'Poppins';transition:border .2s;outline:none}
.login-input:focus{border-color:#e63946}.login-input::placeholder{color:#555}
.sidebar{width:260px;min-height:100vh;background:#111114;border-right:1px solid #2a2a2e;position:fixed;left:0;top:0;z-index:100;transition:transform .3s;display:flex;flex-direction:column}
.main-content{margin-left:260px;min-height:100vh;transition:margin .3s}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;opacity:0;visibility:hidden;transition:all .3s}
.sidebar-backdrop.show{opacity:1;visibility:visible}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-radius:12px;cursor:pointer;transition:all .2s;color:#777;font-size:14px;font-weight:500;margin:2px 12px}
.nav-item:hover{background:rgba(230,57,70,.08);color:#f0f0f0}
.nav-item.active{background:linear-gradient(135deg,rgba(230,57,70,.15),rgba(230,57,70,.05));color:#e63946;border:1px solid rgba(230,57,70,.2)}
.nav-item i{width:20px;text-align:center;font-size:15px}
.stat-card{background:linear-gradient(135deg,#18181c,#1e1e22);border:1px solid #2a2a2e;border-radius:16px;padding:24px;transition:all .3s;overflow:hidden}
.stat-card:hover{border-color:rgba(230,57,70,.3);transform:translateY(-3px)}
.product-card{background:#18181c;border:1px solid #2a2a2e;border-top:3px solid var(--card-accent,#e63946);border-radius:0 0 14px 14px;overflow:hidden;transition:all .35s;position:relative;display:flex;flex-direction:column}
.product-card:hover{border-color:var(--card-accent,#e63946);border-top-width:3px;transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.4),0 0 0 1px var(--card-accent,#e63946)}
.product-card .img-wrap{height:240px;overflow:hidden;position:relative;background:#0e0e10}
.product-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;filter:brightness(.95)}
.product-card:hover .img-wrap img{transform:scale(1.1);filter:brightness(1)}
.product-card .card-body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
.product-card .card-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--card-accent,#e63946);margin-bottom:4px}
.product-card .card-name{font-size:14px;font-weight:600;color:#f0f0f0;line-height:1.3;margin-bottom:6px;flex:1}
.product-card .card-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.product-card .card-price{font-size:18px;font-weight:800;color:var(--card-accent,#e63946)}
.product-card .card-price-old{font-size:11px;color:#555;text-decoration:line-through}
.product-card .card-btn{width:100%;padding:10px 16px;border:none;border-radius:8px;background:transparent;border:1px solid var(--card-accent,#e63946);color:var(--card-accent,#e63946);font-size:11px;font-weight:700;font-family:'Poppins',sans-serif;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;-webkit-user-select:none;user-select:none;position:relative;z-index:1}
.product-card .card-btn:hover{background:var(--card-accent,#e63946);color:#fff}
.product-card .card-btn:active{transform:scale(.96)}
.product-card .card-btn .arrow{transition:transform .2s}
.product-card .card-btn:hover .arrow{transform:translateX(4px)}
.card-admin-actions{position:absolute;top:10px;right:10px;z-index:3;display:flex;gap:6px}
.card-admin-btn{width:30px;height:30px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;backdrop-filter:blur(8px)}
.card-admin-btn.del{background:rgba(230,57,70,.2);color:#e63946;border:1px solid rgba(230,57,70,.3)}
.card-admin-btn.del:hover{background:#e63946;color:#fff}
.card-stock-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:#1a1a1e}
.card-stock-bar .fill{height:100%;border-radius:0 2px 0 0;transition:width .3s}
.badge-tag{position:absolute;top:10px;left:10px;padding:4px 12px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:.8px;z-index:2;color:#fff;pointer-events:none;text-transform:uppercase;backdrop-filter:blur(4px)}
.stock-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.stock-high{background:#2ecc71}.stock-low{background:#f39c12}.stock-critical{background:#e63946;animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:14px 18px;border-radius:12px;background:#18181c;border:1px solid #2a2a2e;box-shadow:0 10px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;animation:toast-in .35s ease,toast-out .35s ease 2.5s forwards;min-width:260px;font-size:13px;pointer-events:auto}
@keyframes toast-in{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toast-out{from{opacity:1}to{transform:translateX(120%);opacity:0}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:5000;opacity:0;visibility:hidden;transition:all .3s;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-box{background:#18181c;border:1px solid #2a2a2e;border-radius:20px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;transform:scale(.92);transition:transform .3s}
.modal-overlay.open .modal-box{transform:scale(1)}
.form-input{width:100%;background:#111114;border:1px solid #2a2a2e;border-radius:10px;padding:10px 14px;color:#f0f0f0;font-size:13px;font-family:'Poppins';transition:border .2s;outline:none}
.form-input:focus{border-color:#e63946}.form-input::placeholder{color:#555}
.cart-row{display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid #1e1e22;transition:background .2s}
.cart-row:hover{background:rgba(230,57,70,.03)}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1px solid #2a2a2e;background:transparent;color:#f0f0f0;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.qty-btn:hover{background:#e63946;border-color:#e63946}.qty-btn:active{transform:scale(.9)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'Poppins';transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;min-height:38px;position:relative;z-index:1;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:#e63946;color:#fff}.btn-primary:hover{background:#c62f3b}
.btn-ghost{background:transparent;border:1px solid #2a2a2e;color:#777}.btn-ghost:hover{color:#e63946;border-color:#e63946}
.btn-surface{background:#111114;border:1px solid #2a2a2e;color:#777}.btn-surface:hover{color:#f0f0f0;border-color:#e63946}
.filter-btn{padding:8px 16px;border-radius:10px;border:1px solid #2a2a2e;background:transparent;color:#777;font-size:12px;font-weight:600;font-family:'Poppins';cursor:pointer;transition:all .15s;touch-action:manipulation}
.filter-btn:hover{border-color:#e63946;color:#f0f0f0}
.filter-btn.on{background:#e63946;border-color:#e63946;color:#fff}
.data-table{width:100%;border-collapse:separate;border-spacing:0}
.data-table th{text-align:left;padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#777;background:#111114;border-bottom:1px solid #2a2a2e}
.data-table th:first-child{border-radius:10px 0 0 0}.data-table th:last-child{border-radius:0 10px 0 0}
.data-table td{padding:14px 16px;font-size:13px;border-bottom:1px solid #1a1a1e;color:#ccc}
.data-table tbody tr{transition:background .15s}.data-table tbody tr:hover{background:rgba(230,57,70,.03)}
.role-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.role-admin{background:rgba(230,57,70,.15);color:#e63946}
.role-staff{background:rgba(52,152,219,.15);color:#3498db}
.role-customer{background:rgba(46,204,113,.15);color:#2ecc71}
.shop-header{background:rgba(8,8,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid #2a2a2e;position:sticky;top:0;z-index:50}
.shop-hero{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(230,57,70,.1),rgba(244,162,97,.05));border-bottom:1px solid #2a2a2e}
.mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:200;width:42px;height:42px;border-radius:12px;background:#18181c;border:1px solid #2a2a2e;color:#f0f0f0;cursor:pointer;align-items:center;justify-content:center;font-size:18px}
@media(max-width:1024px){.sidebar{transform:translateX(-260px)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0!important}.mobile-toggle{display:flex!important}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- LOGIN -->
<div id="loginPage" class="login-page">

  <div class="login-float"></div><div class="login-float"></div><div class="login-float"></div>

      <h1 class="font-heading text-3xl text-white tracking-wider">EVOFIT STORE</h1>

</div>

    <header class="sticky top-0 z-50 bg-bg/80 backdrop-blur-xl border-b border-border px-6 py-4 flex items-center justify-between gap-4">

      <div class="flex items-center gap-3">
        <div class="relative hidden md:block" id="searchWrap"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-muted text-xs"></i><input type="text" id="globalSearch" placeholder="Cari produk..." class="bg-surface border border-border rounded-xl py-2 pl-9 pr-4 text-sm text-txt placeholder-muted focus:outline-none focus:border-accent transition w-56"></div>
        <button type="button" id="btnHeaderCart" class="relative w-10 h-10 rounded-xl bg-surface border border-border flex items-center justify-center text-muted hover:text-accent hover:border-accent transition" aria-label="Keranjang"><i class="fas fa-shopping-bag text-sm"></i><span id="headerCartBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-accent text-white text-[10px] font-bold rounded-full flex items-center justify-center" style="display:none">0</span></button>

    <div class="p-6" id="pageContent"></div>
  </main>
  <div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>
</div>

<!-- SHOP -->
<div id="shopPage" style="display:none">
  <header class="shop-header px-4 md:px-8 py-4 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3"><div class="w-9 h-9 bg-accent rounded-xl flex items-center justify-center shrink-0"><i class="fas fa-dumbbell text-white text-sm"></i></div><span class="font-heading text-xl text-white tracking-wider">EVOFIT</span></div>
    <div class="flex items-center gap-3">
      <div class="relative hidden sm:block"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-muted text-xs"></i><input type="text" id="shopSearch" placeholder="Cari produk..." class="bg-surface border border-border rounded-xl py-2 pl-9 pr-4 text-sm text-txt placeholder-muted focus:outline-none focus:border-accent transition w-52"></div>
      <button type="button" id="btnShopCart" class="relative w-10 h-10 rounded-xl bg-surface border border-border flex items-center justify-center text-muted hover:text-accent hover:border-accent transition" aria-label="Keranjang"><i class="fas fa-shopping-bag text-sm"></i><span id="shopCartBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-accent text-white text-[10px] font-bold rounded-full flex items-center justify-center" style="display:none">0</span></button>
      <button type="button" id="btnShopLogin" class="btn btn-ghost" style="padding:8px 14px;font-size:11px"><i class="fas fa-sign-in-alt"></i><span class="hidden sm:inline"> Login</span></button>
    </div>
  </header>
  <div id="shopContent"></div>
</div>

/* ===== STORAGE KEYS ===== */
var DATA_KEY='evofit_data';
var SESSION_KEY='evofit_session';

/* ===== STATE ===== */
var accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
var products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
var cart=[];
var nextId=15;
var currentPage='dashboard';
var pFilter='all';
var pSort='default';
var shopSubPage='products';
var shopFilter='all';
var currentUser=null;

/* ===== SAVE DATA (produk, akun, keranjang, nextId) ===== */
function saveData(){
  try{
    localStorage.setItem(DATA_KEY,JSON.stringify({
      products:products,
      accounts:accounts,
      cart:cart,
      nextId:nextId
    }));
  }catch(e){}
}

/* ===== LOAD DATA ===== */
function loadData(){
  try{
    var raw=localStorage.getItem(DATA_KEY);
    if(!raw)return false;
    var d=JSON.parse(raw);
    if(d.products&&Array.isArray(d.products))products=d.products;
    if(d.accounts&&Array.isArray(d.accounts))accounts=d.accounts;
    if(d.cart&&Array.isArray(d.cart))cart=d.cart;
    if(typeof d.nextId==='number')nextId=d.nextId;
    return true;
  }catch(e){return false}
}

/* ===== VALIDASI KERANJANG (hapus item yang produknya sudah dihapus) ===== */
function validateCart(){
  var ids={};
  for(var i=0;i<products.length;i++)ids[products[i].id]=true;
  var valid=[];
  for(var j=0;j<cart.length;j++){
    if(ids[cart[j].id]){
      var p=null;
      for(var k=0;k<products.length;k++){if(products[k].id===cart[j].id){p=products[k];break}}
      if(p)cart[j].max=p.stock;
      valid.push(cart[j]);
    }
  }
  cart=valid;
}

/* ===== SAVE SESSION (user aktif + halaman + filter) ===== */
function saveSession(){
  try{
    if(!currentUser||currentUser.role==='guest'){localStorage.removeItem(SESSION_KEY);return}
    localStorage.setItem(SESSION_KEY,JSON.stringify({
      userId:currentUser.id,
      page:currentPage,
      pFilter:pFilter,
      pSort:pSort,
      shopSubPage:shopSubPage,
      shopFilter:shopFilter
    }));
  }catch(e){}
}

/* ===== LOAD SESSION ===== */
function loadSession(){
  try{
    var raw=localStorage.getItem(SESSION_KEY);
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null}
}

/* ===== HAPUS SESSION ===== */
function clearSession(){
  try{localStorage.removeItem(SESSION_KEY)}catch(e){}
}

/* ===== RESET SEMUA DATA KE DEFAULT ===== */
function resetAllData(){
  products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
  cart=[];
  nextId=15;
  try{localStorage.removeItem(DATA_KEY);localStorage.removeItem(SESSION_KEY)}catch(e){}
  toast('Data berhasil direset ke default!','fa-undo','#2ecc71');
  render();
}

function copyText(text){
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(function(){toast('Link berhasil disalin!','fa-link','#2ecc71')}).catch(function(){fallbackCopy(text)})}
  else{fallbackCopy(text)}
}
function fallbackCopy(text){
  try{var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();var ok=document.execCommand('copy');document.body.removeChild(ta);if(ok)toast('Link berhasil disalin!','fa-link','#2ecc71');else toast('Gagal menyalin','fa-exclamation-circle','#f4a261')}catch(e){toast('Gagal menyalin link','fa-exclamation-circle','#e63946')}
}

/* ===== PRODUCT CARD ===== */
function productCardHTML(p,isAdmin){
  var ac=p.accentColor||'#e63946',d=p.originalPrice?Math.round((1-p.price/p.originalPrice)*100):0;
  var sp=Math.min(100,Math.max(2,p.stock/50*100)),sc=p.stock<=5?'#e63946':p.stock<=15?'#f4a261':'#2ecc71';
  return '<div class="product-card" style="--card-accent:'+ac+'"><div class="img-wrap"><span class="badge-tag" style="background:'+p.badgeBg+'">'+p.badge+'</span>'+(isAdmin?'<div class="card-admin-actions"><button type="button" data-del="'+p.id+'" class="card-admin-btn del" title="Hapus"><i class="fas fa-trash"></i></button></div>':'')+'<img src="'+p.img+'" alt="'+p.name+'" loading="lazy"><div class="card-stock-bar"><div class="fill" style="width:'+sp+'%;background:'+sc+'"></div></div></div><div class="card-body"><p class="card-cat">'+p.category+'</p><h3 class="card-name">'+p.name+'</h3><div class="card-price-row"><span class="card-price">'+fmt(p.price)+'</span>'+(p.originalPrice?'<span class="card-price-old">'+fmt(p.originalPrice)+'</span>':'')+(d?'<span style="font-size:10px;font-weight:700;color:#fff;background:rgba(230,57,70,.2);padding:2px 7px;border-radius:4px">-'+d+'%</span>':'')+'</div>'+(isAdmin?'<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><span class="stock-dot '+sClass(p.stock)+'"></span><span style="font-size:11px;color:#777">'+sLabel(p.stock)+' ('+p.stock+')</span></div>':'')+'<button type="button" data-addcart="'+p.id+'" class="card-btn">PESAN SEKARANG <span class="arrow">&rarr;</span></button></div></div>';
}
function filterBtnsHTML(af){return '<div class="flex flex-wrap gap-2 mb-6">'+['all','protein','mass','creatine','preworkout','aksesoris'].map(function(c){return '<button type="button" class="filter-btn '+(c===af?'on':'')+'" data-filter="'+c+'">'+(c==='all'?'Semua':c.charAt(0).toUpperCase()+c.slice(1))+'</button>'}).join('')+'</div>'}
function getFilteredList(sid){var q=(document.getElementById(sid)?document.getElementById(sid).value:'').toLowerCase(),l=products.slice(),f=sid==='shopSearch'?shopFilter:pFilter;if(f!=='all')l=l.filter(function(p){return p.category===f});if(q)l=l.filter(function(p){return p.name.toLowerCase().indexOf(q)!==-1||p.category.toLowerCase().indexOf(q)!==-1});if(pSort==='price-low')l.sort(function(a,b){return a.price-b.price});if(pSort==='price-high')l.sort(function(a,b){return b.price-a.price});if(pSort==='rating')l.sort(function(a,b){return b.rating-a.rating});return l}
function pageProducts(u){var isA=u&&(u.role==='admin'||u.role==='staff'),list=getFilteredList('globalSearch'),html=filterBtnsHTML(pFilter);if(isA)html+='<div class="mb-4"><select id="sortSelect" class="bg-surface border border-border rounded-lg px-3 py-2 text-xs text-txt focus:outline-none focus:border-accent"><option value="default" '+(pSort==='default'?'selected':'')+'>Urutkan</option><option value="price-low" '+(pSort==='price-low'?'selected':'')+'>Harga Terendah</option><option value="price-high" '+(pSort==='price-high'?'selected':'')+'>Harga Tertinggi</option><option value="rating" '+(pSort==='rating'?'selected':'')+'>Rating Tertinggi</option></select></div>';if(!list.length)html+='<div class="text-center py-16 text-muted"><i class="fas fa-search text-3xl mb-3 block opacity-30"></i>Tidak ada produk ditemukan</div>';else html+='<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">'+list.map(function(p){return productCardHTML(p,isA)}).join('')+'</div>';return html}

function shopProductsHTML(){var list=getFilteredList('shopSearch');return '<div class="shop-hero px-4 md:px-8 py-12 text-center"><h2 class="font-heading text-4xl md:text-5xl text-white tracking-wider mb-3">EVOFIT SUPPLEMENTS</h2><p class="text-muted text-sm max-w-md mx-auto">Suplemen fitness premium untuk mendukung perjalanan fitness kamu.</p></div><div class="px-4 md:px-8 py-6">'+filterBtnsHTML(shopFilter)+(!list.length?'<div class="text-center py-16 text-muted"><i class="fas fa-search text-3xl mb-3 block opacity-30"></i>Tidak ada produk ditemukan</div>':'<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">'+list.map(function(p){return productCardHTML(p,false)}).join('')+'</div>')+'</div><footer class="border-t border-border px-4 md:px-8 py-8 mt-8 text-center"><span class="font-heading text-lg text-white tracking-wider">EVOFIT</span><p class="text-muted text-xs mt-1">Supplement Store &copy; 2025</p></footer>'}
function renderShopProducts(){var el=document.getElementById('shopContent');if(el&&shopSubPage==='products')el.innerHTML=shopProductsHTML()}

/* ================================================================
   INIT: RESTORE SESSION ATAU TAMPILKAN LOGIN
   ================================================================ */
(function init(){
  /* Coba restore session dari localStorage */
  var session=loadSession();

  if(session&&session.userId){
    /* Cari user yang masih ada di accounts */
    var user=null;
    for(var i=0;i<accounts.length;i++){
      if(accounts[i].id===session.userId){user=accounts[i];break}
    }

    if(user){
      /* Session valid — langsung masuk tanpa login */
      currentUser=user;
      if(session.pFilter)pFilter=session.pFilter;
      if(session.pSort)pSort=session.pSort;
      if(session.shopSubPage)shopSubPage=session.shopSubPage;
      if(session.shopFilter)shopFilter=session.shopFilter;

      document.getElementById('loginPage').style.display='none';
      document.getElementById('shopPage').style.display='none';
      document.getElementById('dashboardPage').style.display='block';
      buildSidebar();

      /* Navigate ke halaman yang tersimpan */
      var targetPage=session.page||'dashboard';
      if(user.role==='customer'&&targetPage==='dashboard')targetPage='products';
      currentPage='_init_'; /* bypass go() dari init */
      go(targetPage);
      return; /* SELESAI — tidak perlu ke login */
    }
    /* User sudah dihapus, fall through ke login */
    clearSession();
  }

  /* Tidak ada session — tampilkan login */
  renderLinkBox('linkBoxLogin',true);
  checkHash();
  if(window.location.hash==='#shop'&&!isSrcdoc())enterAsGuest();
})();
</script>
